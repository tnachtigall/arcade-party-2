name: Deployment

on: workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a release on the repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/wrapper-validation@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: '${{ github.event.repository != null && github.ref_name != github.event.repository.default_branch }}'

      # perform the gradle build
      - name: Execute Gradle Build
        run: ./gradlew build github --stacktrace -Porg.gradle.parallel.threads=4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
